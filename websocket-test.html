<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket连接测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">WebSocket连接测试</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <!-- 现货WebSocket测试 -->
            <div class="bg-gray-800 rounded-lg p-6">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <span id="spot-status" class="w-3 h-3 rounded-full bg-gray-600 mr-2"></span>
                    现货WebSocket
                </h2>
                <div class="space-y-3">
                    <div>
                        <label class="text-sm text-gray-400">URL:</label>
                        <div class="font-mono text-sm">wss://stream.binance.com:9443/ws/!ticker@arr</div>
                    </div>
                    <div>
                        <label class="text-sm text-gray-400">状态:</label>
                        <div id="spot-status-text" class="text-gray-300">未连接</div>
                    </div>
                    <div>
                        <label class="text-sm text-gray-400">数据接收:</label>
                        <div id="spot-data-count" class="text-gray-300">0 次</div>
                    </div>
                    <div>
                        <label class="text-sm text-gray-400">最后数据大小:</label>
                        <div id="spot-last-size" class="text-gray-300">-</div>
                    </div>
                </div>
                <button id="test-spot-btn" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm">
                    测试连接
                </button>
            </div>
            
            <!-- 合约WebSocket测试 -->
            <div class="bg-gray-800 rounded-lg p-6">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <span id="futures-status" class="w-3 h-3 rounded-full bg-gray-600 mr-2"></span>
                    合约WebSocket
                </h2>
                <div class="space-y-3">
                    <div>
                        <label class="text-sm text-gray-400">URL:</label>
                        <div class="font-mono text-sm">wss://fstream.binance.com/ws/!ticker@arr</div>
                    </div>
                    <div>
                        <label class="text-sm text-gray-400">状态:</label>
                        <div id="futures-status-text" class="text-gray-300">未连接</div>
                    </div>
                    <div>
                        <label class="text-sm text-gray-400">数据接收:</label>
                        <div id="futures-data-count" class="text-gray-300">0 次</div>
                    </div>
                    <div>
                        <label class="text-sm text-gray-400">最后数据大小:</label>
                        <div id="futures-last-size" class="text-gray-300">-</div>
                    </div>
                </div>
                <button id="test-futures-btn" class="mt-4 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-md text-sm">
                    测试连接
                </button>
            </div>
        </div>
        
        <!-- 数据预览 -->
        <div class="bg-gray-800 rounded-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">数据预览</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <h3 class="text-sm font-medium text-gray-400 mb-2">现货数据示例:</h3>
                    <div id="spot-data-preview" class="bg-gray-900 p-3 rounded-md text-xs font-mono text-gray-300 h-40 overflow-y-auto">
                        等待数据...
                    </div>
                </div>
                <div>
                    <h3 class="text-sm font-medium text-gray-400 mb-2">合约数据示例:</h3>
                    <div id="futures-data-preview" class="bg-gray-900 p-3 rounded-md text-xs font-mono text-gray-300 h-40 overflow-y-auto">
                        等待数据...
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 网络信息 -->
        <div class="bg-gray-800 rounded-lg p-6">
            <h2 class="text-xl font-semibold mb-4">网络信息</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <div class="text-sm text-gray-400 mb-1">浏览器:</div>
                    <div id="browser-info" class="text-gray-300 text-sm"></div>
                </div>
                <div>
                    <div class="text-sm text-gray-400 mb-1">WebSocket支持:</div>
                    <div id="websocket-support" class="text-gray-300 text-sm"></div>
                </div>
                <div>
                    <div class="text-sm text-gray-400 mb-1">当前时间:</div>
                    <div id="current-time" class="text-gray-300 text-sm"></div>
                </div>
                <div>
                    <div class="text-sm text-gray-400 mb-1">用户代理:</div>
                    <div id="user-agent" class="text-gray-300 text-xs font-mono"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let spotWS = null;
        let futuresWS = null;
        let spotDataCount = 0;
        let futuresDataCount = 0;
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 更新网络信息
            document.getElementById('browser-info').textContent = navigator.appName + ' ' + navigator.appVersion;
            document.getElementById('websocket-support').textContent = 'WebSocket' in window ? '支持' : '不支持';
            document.getElementById('current-time').textContent = new Date().toLocaleString();
            document.getElementById('user-agent').textContent = navigator.userAgent;
            
            // 绑定按钮事件
            document.getElementById('test-spot-btn').addEventListener('click', testSpotWebSocket);
            document.getElementById('test-futures-btn').addEventListener('click', testFuturesWebSocket);
        });
        
        // 测试现货WebSocket
        function testSpotWebSocket() {
            const btn = document.getElementById('test-spot-btn');
            const statusEl = document.getElementById('spot-status');
            const statusTextEl = document.getElementById('spot-status-text');
            
            // 禁用按钮
            btn.disabled = true;
            btn.textContent = '连接中...';
            
            // 关闭现有连接
            if (spotWS) {
                try {
                    spotWS.close();
                } catch (e) {
                    console.error('关闭现货WebSocket时出错:', e);
                }
                spotWS = null;
            }
            
            // 重置状态
            spotDataCount = 0;
            document.getElementById('spot-data-count').textContent = '0 次';
            document.getElementById('spot-last-size').textContent = '-';
            document.getElementById('spot-data-preview').textContent = '连接中...';
            
            // 更新状态
            statusEl.className = 'w-3 h-3 rounded-full bg-yellow-500 mr-2 animate-pulse';
            statusTextEl.textContent = '连接中...';
            
            try {
                // 创建WebSocket连接
                const ws = new WebSocket('wss://stream.binance.com:9443/ws/!ticker@arr');
                
                ws.onopen = function() {
                    console.log('现货WebSocket连接已打开');
                    statusEl.className = 'w-3 h-3 rounded-full bg-green-500 mr-2';
                    statusTextEl.textContent = '已连接';
                    btn.textContent = '已连接';
                };
                
                ws.onmessage = function(event) {
                    spotDataCount++;
                    document.getElementById('spot-data-count').textContent = spotDataCount + ' 次';
                    document.getElementById('spot-last-size').textContent = event.data.length + ' 字节';
                    
                    // 解析并显示数据
                    try {
                        const data = JSON.parse(event.data);
                        if (data && data.length > 0) {
                            const preview = JSON.stringify(data.slice(0, 2), null, 2);
                            document.getElementById('spot-data-preview').textContent = preview;
                            
                            console.log('现货数据接收成功，代币数量:', data.length);
                            console.log('前两个代币:', data.slice(0, 2));
                        }
                    } catch (e) {
                        console.error('解析现货数据时出错:', e);
                        document.getElementById('spot-data-preview').textContent = '数据解析错误: ' + e.message;
                    }
                };
                
                ws.onclose = function(event) {
                    console.log('现货WebSocket连接已关闭:', event.code, event.reason);
                    statusEl.className = 'w-3 h-3 rounded-full bg-red-500 mr-2';
                    statusTextEl.textContent = '已关闭 (' + event.code + ')';
                    btn.disabled = false;
                    btn.textContent = '重新连接';
                };
                
                ws.onerror = function(error) {
                    console.error('现货WebSocket错误:', error);
                    statusEl.className = 'w-3 h-3 rounded-full bg-red-500 mr-2';
                    statusTextEl.textContent = '连接错误';
                    btn.disabled = false;
                    btn.textContent = '重新连接';
                };
                
                spotWS = ws;
                
            } catch (error) {
                console.error('创建现货WebSocket时出错:', error);
                statusEl.className = 'w-3 h-3 rounded-full bg-red-500 mr-2';
                statusTextEl.textContent = '创建失败';
                btn.disabled = false;
                btn.textContent = '重新连接';
            }
        }
        
        // 测试合约WebSocket
        function testFuturesWebSocket() {
            const btn = document.getElementById('test-futures-btn');
            const statusEl = document.getElementById('futures-status');
            const statusTextEl = document.getElementById('futures-status-text');
            
            // 禁用按钮
            btn.disabled = true;
            btn.textContent = '连接中...';
            
            // 关闭现有连接
            if (futuresWS) {
                try {
                    futuresWS.close();
                } catch (e) {
                    console.error('关闭合约WebSocket时出错:', e);
                }
                futuresWS = null;
            }
            
            // 重置状态
            futuresDataCount = 0;
            document.getElementById('futures-data-count').textContent = '0 次';
            document.getElementById('futures-last-size').textContent = '-';
            document.getElementById('futures-data-preview').textContent = '连接中...';
            
            // 更新状态
            statusEl.className = 'w-3 h-3 rounded-full bg-yellow-500 mr-2 animate-pulse';
            statusTextEl.textContent = '连接中...';
            
            try {
                // 创建WebSocket连接
                const ws = new WebSocket('wss://fstream.binance.com/ws/!ticker@arr');
                
                ws.onopen = function() {
                    console.log('合约WebSocket连接已打开');
                    statusEl.className = 'w-3 h-3 rounded-full bg-green-500 mr-2';
                    statusTextEl.textContent = '已连接';
                    btn.textContent = '已连接';
                };
                
                ws.onmessage = function(event) {
                    futuresDataCount++;
                    document.getElementById('futures-data-count').textContent = futuresDataCount + ' 次';
                    document.getElementById('futures-last-size').textContent = event.data.length + ' 字节';
                    
                    // 解析并显示数据
                    try {
                        const data = JSON.parse(event.data);
                        if (data && data.length > 0) {
                            const preview = JSON.stringify(data.slice(0, 2), null, 2);
                            document.getElementById('futures-data-preview').textContent = preview;
                            
                            console.log('合约数据接收成功，代币数量:', data.length);
                            console.log('前两个代币:', data.slice(0, 2));
                        }
                    } catch (e) {
                        console.error('解析合约数据时出错:', e);
                        document.getElementById('futures-data-preview').textContent = '数据解析错误: ' + e.message;
                    }
                };
                
                ws.onclose = function(event) {
                    console.log('合约WebSocket连接已关闭:', event.code, event.reason);
                    statusEl.className = 'w-3 h-3 rounded-full bg-red-500 mr-2';
                    statusTextEl.textContent = '已关闭 (' + event.code + ')';
                    btn.disabled = false;
                    btn.textContent = '重新连接';
                };
                
                ws.onerror = function(error) {
                    console.error('合约WebSocket错误:', error);
                    statusEl.className = 'w-3 h-3 rounded-full bg-red-500 mr-2';
                    statusTextEl.textContent = '连接错误';
                    btn.disabled = false;
                    btn.textContent = '重新连接';
                };
                
                futuresWS = ws;
                
            } catch (error) {
                console.error('创建合约WebSocket时出错:', error);
                statusEl.className = 'w-3 h-3 rounded-full bg-red-500 mr-2';
                statusTextEl.textContent = '创建失败';
                btn.disabled = false;
                btn.textContent = '重新连接';
            }
        }
        
        // 定期更新时间
        setInterval(function() {
            document.getElementById('current-time').textContent = new Date().toLocaleString();
        }, 1000);
    </script>
</body>
</html>
